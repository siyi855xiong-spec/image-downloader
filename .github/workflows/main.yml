name: Docker Image Downloader (Stable Link)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          # 释放 GitHub 服务器磁盘空间，确保能放下 5GB+ 的镜像
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Pull Docker Image
        run: |
          # 拉取适配你 3090 驱动 (535) 的 CUDA 12.2 镜像
          docker pull nvcr.io/nvidia/pytorch:23.08-py3

      - name: Save and Compress Image
        run: |
          # 压缩镜像以减小体积
          docker save nvcr.io/nvidia/pytorch:23.08-py3 | gzip > pytorch_23_08.tar.gz
          
      - name: Upload to WeTransfer
        run: |
          # 使用现成的 Action 工具上传到 WeTransfer
          # 它会直接在日志中输出一个永久下载链接
          curl -fsSL https://raw.githubusercontent.com/Mikubill/transfer/master/install.sh | sh
          ./transfer wet pytorch_23_08.tar.gz
     
