name: Docker Image Downloader (Stable Link)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space
        run: |
          # 释放 GitHub 服务器磁盘空间，确保能放下 5GB+ 的镜像
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Pull Docker Image
        run: |
          # 拉取适配你 3090 驱动 (535) 的 CUDA 12.2 镜像
          docker pull nvcr.io/nvidia/pytorch:23.08-py3

      - name: Save and Split Image
        run: |
          # 打包并压缩镜像
          docker save nvcr.io/nvidia/pytorch:23.08-py3 | gzip > pytorch_23_08.tar.gz
          # 将大文件拆分成 2GB 的小块，方便 GitHub Artifact 上传
          split -b 2G pytorch_23_08.tar.gz pytorch_part_
          
      - name: Upload Parts
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-parts
          path: pytorch_part_*
     
