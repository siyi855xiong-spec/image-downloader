name: Docker Image Downloader

on:
  workflow_dispatch: # 允许你手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Docker Image
        run: |
          # 拉取你需要的镜像
          docker pull nvcr.io/nvidia/pytorch:23.08-py3

      - name: Save Docker Image to Tar
        run: |
          # 压缩镜像以减小体积
          docker save nvcr.io/nvidia/pytorch:23.08-py3 | gzip > pytorch_23_08.tar.gz
          
      - name: Upload to Transfer.sh
        run: |
          # 将文件上传到匿名传输站，并打印下载链接
          curl --upload-file ./pytorch_23_08.tar.gz https://transfer.sh/pytorch_23_08.tar.gz
